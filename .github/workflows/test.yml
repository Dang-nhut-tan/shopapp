name: Test

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DB_USERNAME: root
      DB_PASSWORD: root
      DB_NAME: shopapp_test_ci
      DB_HOST: 127.0.0.1
      DB_PORT: 3306
      DB_DIALECT: mysql

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: yarn

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Run tests
        run: yarn test

      - name: Setup database for Newman
        run: yarn db:setup

      - name: Run Newman tests
        run: |
          PORT=3000 node index.js &
          SERVER_PID=$!
          trap "kill $SERVER_PID" EXIT

          for i in {1..15}; do
            curl -fs http://localhost:3000/ && break
            sleep 1
          done

          yarn test:newman
